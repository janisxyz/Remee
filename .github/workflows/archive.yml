name: Archive Remee programmer

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - package.json
      - scripts/archive.mjs
      - .github/workflows/archive.yml

permissions:
  contents: write

concurrency:
  group: remee-archive-main
  cancel-in-progress: true

jobs:
  archive:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Validate archiver syntax
        run: npm run check

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Capture programmer
        id: capture
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          mkdir -p snapshot
          for attempt in 1 2 3; do
            echo "Capture attempt ${attempt}"
            if npm run archive 2>&1 | tee "snapshot/archive-attempt-${attempt}.log"; then
              exit 0
            fi
            sleep 15
          done
          exit 1

      - name: Upload capture diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: remee-capture
          path: snapshot/
          if-no-files-found: warn
          retention-days: 14

      - name: Commit captured snapshot
        if: always()
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No archive changes to commit"
          else
            git commit -m "Archive Remee programmer"
            git push
          fi

      - name: Verify capture succeeded
        if: steps.capture.outcome == 'failure'
        run: |
          echo "The live programmer could not be captured. Open the uploaded remee-capture artifact for the browser screenshot and logs."
          exit 1
