name: Archive Remee programmer

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - package.json
      - scripts/archive.mjs
      - .github/workflows/archive.yml

permissions:
  contents: write

jobs:
  archive:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Capture programmer
        id: capture
        continue-on-error: true
        run: npm run archive

      - name: Commit captured snapshot
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add snapshot package-lock.json
          if git diff --cached --quiet; then
            echo "No archive changes to commit"
          else
            git commit -m "Archive Remee programmer"
            git push
          fi

      - name: Fail if capture failed
        if: steps.capture.outcome == 'failure'
        run: exit 1
