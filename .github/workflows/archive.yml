name: Archive Remee programmer

on:
  workflow_dispatch:
  schedule:
    - cron: '17 3 1 * *'
  push:
    branches:
      - main
    paths:
      - package.json
      - package-lock.json
      - scripts/**
      - .github/workflows/archive.yml

permissions:
  contents: write

concurrency:
  group: remee-archive-main
  cancel-in-progress: true

jobs:
  archive:
    runs-on: ubuntu-latest
    timeout-minutes: 18

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Validate scripts
        run: npm run check

      - name: Cache Playwright Chromium
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Chromium system dependencies
        run: npx playwright install-deps chromium

      - name: Install Chromium browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      - name: Capture and validate programmer
        shell: bash
        run: |
          set -euo pipefail
          rm -rf diagnostics
          mkdir -p diagnostics
          for attempt in 1 2 3; do
            log="diagnostics/archive-attempt-${attempt}.log"
            echo "Capture attempt ${attempt}"
            if {
              npm run archive &&
              npm run sanitize &&
              npm run validate
            } 2>&1 | tee "$log"; then
              exit 0
            fi
            sleep 15
          done
          exit 1

      - name: Upload capture diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: remee-capture-diagnostics
          path: |
            diagnostics/
            snapshot/
          if-no-files-found: warn
          retention-days: 14

      - name: Commit and publish captured snapshot
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add snapshot package-lock.json
          if git diff --cached --quiet; then
            echo "No archive changes to commit"
          else
            git commit -m "Archive and validate Remee programmer"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

          # GitHub Pages is configured for this legacy branch.
          git push origin HEAD:archive-programmer --force
