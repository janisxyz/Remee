name: Archive Remee programmer

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - package.json
      - scripts/**
      - .github/workflows/archive.yml

permissions:
  contents: write

concurrency:
  group: remee-archive-main
  cancel-in-progress: true

jobs:
  archive:
    runs-on: ubuntu-latest
    timeout-minutes: 18

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Validate scripts
        run: npm run check

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Capture and validate programmer
        id: capture
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          mkdir -p diagnostics
          for attempt in 1 2 3; do
            log="diagnostics/archive-attempt-${attempt}.log"
            echo "Capture attempt ${attempt}"
            if {
              npm run archive &&
              npm run sanitize &&
              npm run validate
            } 2>&1 | tee "$log"; then
              cp "$log" snapshot/
              exit 0
            fi
            mkdir -p snapshot
            cp "$log" snapshot/ || true
            sleep 15
          done
          exit 1

      - name: Upload capture diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: remee-capture
          path: snapshot/
          if-no-files-found: warn
          retention-days: 14

      - name: Commit captured snapshot
        if: always()
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No archive changes to commit"
          else
            git commit -m "Archive and validate Remee programmer"
            git push
          fi

      - name: Verify capture succeeded
        if: steps.capture.outcome == 'failure'
        run: |
          echo "The programmer failed offline validation. Open the remee-capture artifact for logs and screenshots."
          exit 1
