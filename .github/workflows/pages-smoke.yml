name: Verify live Remee Pages site

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/pages-smoke.yml
      - scripts/validate-live.mjs
      - package.json
      - package-lock.json
  workflow_run:
    workflows:
      - Deploy Remee programmer to Pages
    types:
      - completed

permissions:
  contents: write
  pages: read

concurrency:
  group: remee-pages-live-smoke
  cancel-in-progress: true

jobs:
  smoke:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Cache Playwright Chromium
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Chromium system dependencies
        run: npx playwright install-deps chromium

      - name: Install Chromium browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      - name: Validate live programmer in Chromium
        id: live
        continue-on-error: true
        env:
          SITE_URL: https://janisxyz.github.io/Remee/
        run: npm run validate:live

      - name: Commit live browser evidence
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add status/pages-browser-live.json status/pages-browser-live.png
          if git diff --cached --quiet; then
            echo "No live browser verification changes"
            exit 0
          fi
          git commit -m "Record live Remee browser validation"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Require live browser success
        if: steps.live.outcome == 'failure'
        run: |
          cat status/pages-browser-live.json
          exit 1
