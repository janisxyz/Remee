name: Verify live Remee Pages site

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/pages-smoke.yml
  workflow_run:
    workflows:
      - Deploy Remee programmer to Pages
    types:
      - completed

permissions:
  contents: write
  pages: read

concurrency:
  group: remee-pages-live-smoke
  cancel-in-progress: true

jobs:
  smoke:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Verify Pages API and live site
        id: live
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -uo pipefail
          mkdir -p status

          api_url="https://api.github.com/repos/${GITHUB_REPOSITORY}/pages"
          api_code=$(curl --retry 3 --retry-delay 2 -sS -L \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -o /tmp/pages.json -w '%{http_code}' "${api_url}")

          site_url=$(jq -r '.html_url // empty' /tmp/pages.json 2>/dev/null || true)
          if [ -z "${site_url}" ]; then
            owner="${GITHUB_REPOSITORY%%/*}"
            repo="${GITHUB_REPOSITORY#*/}"
            site_url="https://${owner}.github.io/${repo}/"
          fi
          case "${site_url}" in */) ;; *) site_url="${site_url}/" ;; esac

          live_code=000
          matched=false
          for attempt in $(seq 1 18); do
            live_code=$(curl --retry 2 --retry-delay 1 -sS -L \
              -H 'Cache-Control: no-cache' \
              -o /tmp/live.html -w '%{http_code}' \
              "${site_url}?smoke=${GITHUB_RUN_ID}-${attempt}" || echo 000)
            if [ "${live_code}" = "200" ] && grep -Eqi 'Remee Customization App|Customize your dream signal' /tmp/live.html; then
              matched=true
              break
            fi
            sleep 10
          done

          jq -n \
            --arg checked_at "$(date -u +%FT%TZ)" \
            --arg api_url "${api_url}" \
            --arg api_code "${api_code}" \
            --arg site_url "${site_url}" \
            --arg live_code "${live_code}" \
            --argjson content_matched "${matched}" \
            --slurpfile pages /tmp/pages.json \
            '{checkedAt:$checked_at,pagesApi:$api_url,pagesApiStatus:$api_code,siteUrl:$site_url,httpStatus:$live_code,contentMatched:$content_matched,pages:($pages[0] // null)}' \
            > status/pages-live.json

          cat status/pages-live.json
          [ "${api_code}" = "200" ]
          [ "${live_code}" = "200" ]
          [ "${matched}" = "true" ]

      - name: Commit live verification result
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add status/pages-live.json
          if git diff --cached --quiet; then
            echo "No live verification changes"
            exit 0
          fi
          git commit -m "Record live Remee Pages verification"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Require live site success
        if: steps.live.outcome == 'failure'
        run: |
          cat status/pages-live.json
          exit 1
